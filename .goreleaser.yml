project_name: remind-me-to
version: 2

builds:
  - builder: rust
    binary: remind-me-to
    dir: .
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    flags:
      - --release
      - -p=cli

archives:
  - name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    formats:
      - tar.gz
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
