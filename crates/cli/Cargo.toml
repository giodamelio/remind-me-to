[package]
name = "remind-me-to-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "remind-me-to"
path = "src/main.rs"

[dependencies]
remind-me-to-lib = { path = "../lib" }
clap = { version = "4", features = ["derive"] }
config = "0.14"
miette = { version = "7", features = ["fancy"] }
ariadne = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_json = "1"
colored = "3"

[dev-dependencies]
assert_cmd = "2"
insta = { version = "1", features = ["filters"] }
insta-cmd = "0.6"
predicates = "3"
tempfile = "3"
regex = "1"
